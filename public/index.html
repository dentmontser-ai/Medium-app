<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedSim - أنشئ نموذجك التجريبي</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-section">
                <h1>🏥 MedSim</h1>
                <p>منصة الاختبارات الطبية الذكية</p>
                <p style="font-size: 0.85rem; margin-top: 12px; opacity: 0.85; font-weight: 600; letter-spacing: 0.5px;">Made by Dr. Montser Aljodaei</p>
            </div>
            <p class="subtitle">أنشئ نموذجك التجريبي في ثوانٍ</p>
        </header>
        <main>
            <div class="card">
                <form id="generator-form">
                    <div class="form-group">
                        <label for="specialty">1️⃣ اختر تخصصك</label>
                        <select id="specialty" name="specialty" required>
                            <option value="">-- اختر التخصص --</option>
                            <option value="طب بشري">طب بشري</option>
                            <option value="طب أسنان">طب أسنان</option>
                            <option value="صيدلة">صيدلة</option>
                            <option value="مختبرات طبية">مختبرات طبية</option>
                            <option value="تمريض">تمريض</option>
                            <option value="العلاج الطبيعي">العلاج الطبيعي</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="year">2️⃣ اختر سنتك الدراسية</label>
                        <select id="year" name="year" required>
                            <option value="">-- اختر السنة --</option>
                            <option value="السنة الأولى">السنة الأولى</option>
                            <option value="السنة الثانية">السنة الثانية</option>
                            <option value="السنة الثالثة">السنة الثالثة</option>
                            <option value="السنة الرابعة">السنة الرابعة</option>
                            <option value="السنة الخامسة">السنة الخامسة</option>
                            <option value="السنة السادسة">السنة السادسة</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="subject">3️⃣ اكتب اسم المادة</label>
                        <input type="text" id="subject" name="subject" placeholder="مثال: علم التشريح (Anatomy)" required>
                    </div>
                    <button type="submit" class="btn-primary">🚀 أنشئ نموذجي الآن</button>
                </form>
                <div id="loading-message" class="hidden">
                    <div class="spinner"></div>
                    <p>يرجى الانتظار، نقوم بإعداد أسئلتك...</p>
                </div>
            </div>
        </main>
        <footer>
            <p>© 2024 MedSim - منصة تعليمية ذكية للطلاب الطبيين</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
