[build]
  command = "npm install"
  functions = "functions"
  publish = "public"

[dev]
  command = "npm start"
  port = 3000

[[redirects]]
  from = "/generate-questions"
  to = "/.netlify/functions/server"
  status = 200

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/server"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
